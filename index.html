/* ---------- 다운로드 + 트래킹 ---------- */
function trackAndDownload(week, lang, url){
  // GA4 익명 이벤트 전송 (누가 받았는지는 수집 안 함, 횟수만 집계)
  if (typeof gtag === "function"){
    gtag('event', 'report_download', {
      report_week: week,
      language: lang
    });
  }
  // 실제 파일 다운로드
  window.open(url, '_blank');
}

/* ---------- 렌더링 ---------- */
function iconDownload(){
  return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 21h16"/></svg>';
}

function renderHero(){
  const t = I18N[currentUI];
  const r = REPORTS[0];
  document.documentElement.lang = currentUI;
  document.getElementById('heroTitle').textContent = r.title[currentUI];
  document.getElementById('heroMeta').textContent = r.issue[currentUI] + " · " + r.date;
  document.getElementById('heroDesc').textContent = r.desc ? r.desc[currentUI] : "";
  const box = document.getElementById('heroDownloads');
  box.innerHTML = "";
  ["ko","en","zh","ja"].forEach(lang=>{
    const url = r.files[lang];
    const btn = document.createElement(url ? 'button' : 'div');
    btn.className = 'dlbtn' + (url ? '' : ' disabled');
    btn.innerHTML = (url ? iconDownload() : '') +
      '<span>'+LANG_NAMES[lang]+' PDF</span>' +
      (url ? '' : ' <small>'+t.soon+'</small>');
    if (url) btn.onclick = ()=>trackAndDownload(r.week, lang, url);
    box.appendChild(btn);
  });
}

function renderArchive(){
  const t = I18N[currentUI];
  const past = REPORTS.slice(1);
  document.getElementById('archiveCount').textContent = past.length + " " + t.reports;
  const box = document.getElementById('archive');
  box.innerHTML = "";
  past.forEach(r=>{
    const item = document.createElement('div');
    item.className = 'arc-item';
    const langPills = ["ko","en","zh","ja"].map(lang=>{
      const url = r.files[lang];
      if (url){
        return '<span class="langpill" onclick="trackAndDownload(\''+r.week+'\',\''+lang+'\',\''+url+'\')">'+LANG_NAMES[lang]+'</span>';
      }
      return '<span class="langpill off">'+LANG_NAMES[lang]+'</span>';
    }).join("");
    item.innerHTML =
      '<div class="arc-left">'+
        '<div class="arc-issue">'+r.issue[currentUI]+'</div>'+
        '<div class="arc-title">'+r.title[currentUI]+'</div>'+
        '<div class="arc-date">'+r.date+'</div>'+
      '</div>'+
      '<div class="arc-langs">'+langPills+'</div>';
    box.appendChild(item);
  });
}

  const t = I18N[currentUI];
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const key = el.getAttribute('data-i18n');
    if (t[key]) el.textContent = t[key];
  });
}

function setUI(lang){
  currentUI = lang;
  document.querySelectorAll('#langsel button').forEach(b=>{
    b.classList.toggle('active', b.getAttribute('data-ui')===lang);
  });
  applyI18n(); renderHero(); renderArchive();
}

document.querySelectorAll('#langsel button').forEach(b=>{
  b.addEventListener('click', ()=>setUI(b.getAttribute('data-ui')));
});

/* init */
setUI('ko');
</script>
</body>
</html>
